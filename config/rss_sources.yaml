     score: 6
   - term: "DeepSeek"
     score: 8
   - term: "Transformer"
     score: 6
   - term: "Diffusion"
     score: 7
   - term: "Large Language Model"
     score: 6
   - term: "Foundation Model"
     score: 7
   - term: "Agentic"
     score: 8
   - term: "AI Agent"
     score: 8
   - term: "RAG"
     score: 6
   - term: "Multi-modal"
     score: 7
   - term: "multimodal"
     score: 7
   - term: "Reinforcement Learning"
     score: 6
   - term: "RLHF"
     score: 6
   - term: "fine-tuning"
     score: 5
   - term: "alignment"
     score: 6
   - term: "safety"
     score: 5
   - term: "open source"
