 # 跳过关键词（含这些词的标题直接过滤）
 skip_keywords:
   - "job posting"
   - "hiring"
   - "sponsored"
   - "advertisement"
   - "webinar"
 
 # 每天最多发布的文章数
 max_posts_per_run: 2
 
 # 文章新鲜度窗口（小时）
 freshness_hours: 48
 
 # 历史记录保留天数
 history_retention_days: 30
