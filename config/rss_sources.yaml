 # AI 热点 RSS 订阅源配置
 # weight: 关键词匹配时的权重系数
 # category: 来源分类（paper / blog / media / community）
 
 sources:
   - name: "arXiv cs.AI"
     url: "https://rss.arxiv.org/rss/cs.AI"
     category: paper
     weight: 1.2
 
   - name: "arXiv cs.LG"
     url: "https://rss.arxiv.org/rss/cs.LG"
     category: paper
     weight: 1.2
 
   - name: "arXiv cs.CL"
     url: "https://rss.arxiv.org/rss/cs.CL"
     category: paper
     weight: 1.1
 
   - name: "OpenAI Blog"
     url: "https://openai.com/blog/rss.xml"
     category: blog
     weight: 1.5
 
   - name: "Google AI Blog"
     url: "https://blog.research.google/feed/"
     category: blog
     weight: 1.3
 
   - name: "Anthropic Blog"
     url: "https://www.anthropic.com/rss.xml"
     category: blog
     weight: 1.5
 
   - name: "Meta AI Blog"
     url: "https://ai.meta.com/blog/rss.xml"
     category: blog
     weight: 1.3
 
   - name: "DeepMind Blog"
     url: "https://deepmind.google/blog/rss.xml"
     category: blog
     weight: 1.3
 
   - name: "TechCrunch AI"
     url: "https://techcrunch.com/category/artificial-intelligence/feed/"
     category: media
     weight: 1.0
 
   - name: "MIT Tech Review AI"
     url: "https://www.technologyreview.com/topic/artificial-intelligence/rss/"
     category: media
     weight: 1.0
 
   - name: "VentureBeat AI"
     url: "https://venturebeat.com/category/ai/feed/"
     category: media
     weight: 1.0
 
   - name: "The Verge AI"
     url: "https://www.theverge.com/ai-artificial-intelligence/rss.xml"
     category: media
     weight: 1.0
 
   - name: "Hacker News - AI"
     url: "https://hnrss.org/frontpage?q=AI+artificial+intelligence+machine+learning&count=30"
     category: community
     weight: 0.9
 
   - name: "Reddit ML"
     url: "https://www.reddit.com/r/MachineLearning/.rss"
     category: community
     weight: 0.8
 
 # AI 关键词评分系统
 keywords:
   - term: "GPT-5"
     score: 10
   - term: "GPT-4"
     score: 8
   - term: "o3"
     score: 9
   - term: "o4"
     score: 10
